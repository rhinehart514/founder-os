# founder-os portfolio
# Each idea tracks the full validation journey: raw → researching → validating → committed → building → shipped → killed

ideas:
  founder-os:
    name: "founder-os — Cursor for PM"
    stage: building
    created: 2026-03-22
    last_updated: 2026-03-25
    outcome: "Solo founders kill bad ideas faster and build only what has validated demand"
    opportunity: "Bottleneck moved upstream — everyone builds fast, nobody knows what to build. Existing tools are browser-based and disconnected from the building workflow."
    hierarchy_tier: system
    customer:
      name: "Solo technical founder (indie hacker archetype)"
      pain: "#1 complaint from 20K+ solo founder posts is direction, not money or skills. 'Nobody to ask who actually understood what I was building.' Builds fast but ships to silence."
      current_solution: "IdeaProof (free, browser), gut feel, Reddit/IH posts, landing page + signups, Notion docs — all browser-based and disconnected from codebase"
      budget: "$0-85/mo (adjacent: Cursor $20/mo, Claude Pro $20/mo paid without debate)"
    wedge: "Demand validation inside Claude Code — zero context-switching from thinking to building"
    why_now: "YC Spring 2026 RFS names 'Cursor for PM' category. Claude Code at 75% usage among small startups. Plugin marketplace launched. Solo founders at 36.3% of startups. 0 demand-side plugins exist."
    why_you: "Already built. 7 consolidated skills, 31 agents, learning loop that compounds across ventures. Lives where code gets written — not another browser tab."
    model:
      pricing: "Free/open-source (marketplace distribution)"
      channel: "Claude Code plugin marketplace (9K+ plugins, 101 official)"
      retention: "Learning loop — predictions, grading, experiment-learnings compound across ventures. Portfolio follows you across projects."
    competition:
      - name: IdeaProof
        pricing: "Free (90 credits), paid tiers"
        weakness: "Browser-based, one-shot validation, no learning loop, disconnected from building"
      - name: Cofounder AI
        pricing: "$39-85/mo"
        weakness: "Browser-based, idea-to-exit scope too broad, no code integration"
      - name: siift.ai
        pricing: "Freemium"
        weakness: "Startup strategy focus, browser-based, no measurement integration"
      - name: PM Skills Marketplace
        pricing: "Free (plugins)"
        weakness: "Framework templates, not opinionated product thinking. No learning loop."
      - name: pmprompt.com
        pricing: "Free"
        weakness: "26+ PM frameworks but no opinion — it's a template library, not a cofounder"
    assumptions:
      - statement: "Solo founders want structured help deciding what to build (not just frameworks)"
        tested: false
      - statement: "CLI is the right surface for product thinking (vs browser)"
        tested: false
      - statement: "The learning loop that compounds across ventures is actually valuable"
        tested: false
      - statement: "Plugin marketplace is a viable distribution channel for demand-side tools"
        tested: false
      - statement: "Free/open-source can sustain development (or converts to paid tiers later)"
        tested: false
    hypotheses:
      - statement: "A stranger can install and run /demand new within 10 minutes"
        status: untested
        evidence: []
      - statement: "The demand pipeline produces more actionable output than IdeaProof"
        status: untested
        evidence: []
      - statement: "Solo founders who use founder-os kill ideas 2x faster than their baseline"
        status: untested
        evidence: []
    kill_condition: "Claude Code ships native product thinking features, OR strangers try it and find zero value in structured demand validation, OR the learning loop doesn't compound (founders don't return enough)"
    patterns_detected: ["audience-of-one-risk"]
    demand_tier: hypothesized
    jobs:
      - type: functional
        statement: "When I have a new idea, I want to validate whether anyone actually wants it before I build it, so I can stop wasting weeks on dead-end projects"
        importance: 9
        satisfaction: 3
        opportunity_score: 15
        evidence_class: market
      - type: emotional
        statement: "When I'm deciding what to build next, I want to feel confident my decision is grounded in evidence, so I can stop second-guessing and commit"
        importance: 8
        satisfaction: 3
        opportunity_score: 13
        evidence_class: stated
      - type: social
        statement: "When I tell other founders what I'm working on, I want to show I killed 5 ideas to find the right one, so I'm seen as disciplined — not scattered"
        importance: 6
        satisfaction: 5
        opportunity_score: 7
        evidence_class: inferred
    forces:
      push:
        description: "40% of AI startups die. Building the wrong thing is the #1 failure mode. Browser-based tools add context-switching friction."
        strength: 8
      pull:
        description: "Demand validation where code gets written. Learning compounds across ventures. YC-named category creates social proof."
        strength: 7
      anxiety:
        description: "Will structured validation slow me down? Am I the only user? Is this just another framework library?"
        strength: 6
      habit:
        description: "Gut feel works sometimes. Browser tools are familiar. 'Just build and iterate' is the default."
        strength: 5
      net_switching_energy: 4
    evidence_summary:
      observed: 5
      stated: 8
      market: 12
      inferred: 6
    packages:
      - customer_name: "Kill Bad Ideas Fast"
        one_liner: "Know whether to build or kill before you write a line of code"
        internal_features: [demand-new, demand-kill, demand-jobs, demand-forces]
        serves_job: "functional:0"
        tier: core
      - customer_name: "Build What Matters"
        one_liner: "Every feature traces back to a customer job — build demand-validated products"
        internal_features: [build-plan, build-go, measure-eval, measure-score]
        serves_job: "functional:0"
        tier: core
      - customer_name: "Get Smarter Every Venture"
        one_liner: "Your judgment compounds — kill patterns, prediction accuracy, and market knowledge follow you across projects"
        internal_features: [learn-grade, learn-consolidate, learn-audit, predictions]
        serves_job: "emotional:1"
        tier: expansion
